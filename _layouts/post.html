---
layout: default
---
<main>
    <div class="category-container">
        {% for tag in page.tags %}
            <div class="category">{{ tag | upcase }}</div>
        {% endfor %}
    </div>

    <h1 class="title">{{ page.title }}</h1>

    <div class="divider"></div>

    <div class="meta">
        {{ page.date | date: "%d.%m.%y" }} | By {{ page.author | default: site.author }}
    </div>

    <article class="blog-content">
        {{ content }}
    </article>

    {% include navlinks.html %}
</main>
